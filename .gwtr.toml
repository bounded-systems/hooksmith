# .gwtr.toml
# Hooksmith Git Worktree Manager Configuration
# Located in repository root: /Users/bobby/dev/repos/hooksmith

[general]
# Local override for worktree storage location - matches existing layout
worktree_storage = "../"
# Default branch pattern for automatic naming
default_branch_pattern = "feature/* => {repo}-{branch}"
# Glob patterns to ignore by default
ignore_glob = ["target/", ".cache/", "node_modules/", "dist/"]

[storage]
# Keep a reasonable number of active worktrees
lru_limit = 15
# Use named subdirectories for better organization
use_named_subdirs = true
# Clean up old worktrees automatically
auto_cleanup = true

[named_worktrees]
# Maps long feature branches to machine-friendly folder names
# These match your existing worktree layout
"feature/spin-integration" = "hooksmith-spin"
"feature/spin-integration-v2" = "hooksmith-spin-integration"

[hooks]
# Post-create hooks for automatic setup
post_create = [
    "echo 'Setting up worktree: {worktree_path}'",
    "cd {worktree_path} && cargo build",
    "cd {worktree_path} && cargo xtask gen-all --validate",
    "cd {worktree_path} && spin build || true"
]

# Post-switch hooks for environment validation
post_switch = [
    "echo 'Switching to worktree: {worktree_path}'",
    "cd {worktree_path} && cargo check",
    "cd {worktree_path} && cargo xtask check-all"
]

# Pre-remove hooks for cleanup
pre_remove = [
    "echo 'Cleaning up worktree: {worktree_path}'",
    "cd {worktree_path} && cargo clean",
    "cd {worktree_path} && rm -rf target/"
]

[patterns]
# Pattern-based configuration for different branch types
[patterns.feature]
glob = "feature/*"
template = "{repo}-{branch}"
hooks = [
    "cd {worktree_path} && cargo build",
    "cd {worktree_path} && cargo xtask gen-all"
]

[patterns.bugfix]
glob = "bugfix/*"
template = "{repo}-{branch}"
hooks = [
    "cd {worktree_path} && cargo build",
    "cd {worktree_path} && cargo test"
]

[patterns.hotfix]
glob = "hotfix/*"
template = "{repo}-{branch}"
hooks = [
    "cd {worktree_path} && cargo build",
    "cd {worktree_path} && cargo xtask check-all"
]

[integration]
# Integration settings for Hooksmith-specific features
lefthook = true
xtask = true
wasm_components = true
preserve_branches = ["main", "develop", "master"] 
