# Clippy configuration for Hooksmith project
# Minimal configuration for compatibility

# MSRV (Minimum Supported Rust Version)
msrv = "1.88.0"

# Allow specific lints that might be too strict for our use case
allow-comparison-to-zero = true
allow-dbg-in-tests = true
allow-expect-in-tests = true
allow-panic-in-tests = true
allow-print-in-tests = true
allow-unwrap-in-tests = true
allow-useless-vec-in-tests = true
