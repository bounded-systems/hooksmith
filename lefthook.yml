# Lefthook configuration for Hooksmith
# Enforces file type restrictions and generation markers

pre-commit:
  parallel: true
  commands:
    # Check file types and generation markers
    check-files:
      glob: "*.{rs,toml,md,yaml,yml,wit,json}"
      run: cargo run -p xtask -- check-files --strict
      
    # Validate generated files
    validate-generated:
      glob: "*.{md,yaml,yml,wit,json}"
      run: cargo run -p xtask -- validate-generated --strict
      
    # Check formatting
    format:
      glob: "*.rs"
      run: cargo fmt --check
      
    # Run clippy
    clippy:
      glob: "*.rs"
      run: cargo clippy -- -D warnings

pre-push:
  parallel: true
  commands:
    # Generate and validate all files before push
    generate-and-validate:
      run: |
        cargo run -p xtask -- gen-all --validate
        cargo run -p xtask -- check-files --strict
      
    # Run tests
    test:
      run: cargo test --workspace

commit-msg:
  commands:
    # Validate commit message format
    validate-commit-msg:
      run: |
        # Check if commit message follows conventional commits
        if ! echo "$1" | grep -qE "^(feat|fix|docs|style|refactor|test|chore)(\(.+\))?: .+"; then
          echo "❌ Commit message must follow conventional commits format:"
          echo "   <type>(<scope>): <description>"
          echo "   Examples:"
          echo "   feat: add new feature"
          echo "   fix(api): resolve bug in API"
          echo "   docs: update documentation"
          exit 1
        fi
