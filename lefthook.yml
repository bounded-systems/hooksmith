pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all -- --check
      stage_fixed: true
    clippy:
      glob: "*.rs"
      run: cargo clippy --workspace --fix --allow-dirty --allow-staged
      stage_fixed: true
    git-add:
      run: git add .
      stage_fixed: true
    validate-extensions:
      run: cargo run -p xtask -- contract-validate validate-extensions
    contract-validate:
      run: cargo run -p xtask -- contract-validate pre-commit --validate-generated
    validate-generated:
      run: cargo run -p xtask -- validate-generated --staged-only --strict
    check-generated:
      run: cargo run -p xtask -- validate-headers --strict
    audit:
      run: cargo audit
    deny:
      run: cargo deny check

pre-push:
  parallel: true
  commands:
    comprehensive-validate:
      run: cargo run -p xtask -- contract-validate validate --range HEAD~1..HEAD
    # Temporarily disabled due to generation issues
    # validate-all-generated:
    #   run: cargo run -p xtask -- validate-generated --strict
    validate-headers:
      run: cargo run -p xtask -- validate-headers --strict

commit-msg:
  commands:
    validate-commit-msg:
      run: cargo run -p xtask -- validate-commit-msg {1}

