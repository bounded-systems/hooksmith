pre-commit:
  parallel: true
  commands:
    hooksmith-clippy:
      run: cargo clippy --all-targets --all-features -- -D warnings
      glob: "*.rs"
    hooksmith-gen-wit:
      run: cargo xtask gen-wit
      glob: "*.rs"
    hooksmith-test:
      run: cargo test --all-targets --all-features
      glob: "*.rs"
    hooksmith-fmt:
      run: cargo fmt --all -- --check
      glob: "*.rs"

pre-push:
  parallel: true
  commands:
    hooksmith-audit:
      run: cargo audit
    hooksmith-check-generated:
      run: cargo xtask check --strict

post-push:
  commands:
    verify-hooksmith:
      run: cargo run --bin hooksmith -- verify-hooks --check-installation
      description: "Verify Hooksmith hooks are properly configured"
