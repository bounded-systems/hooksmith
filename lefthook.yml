# Lefthook configuration for Hooksmith
# This file configures Git hooks using Lefthook

# Pre-commit hooks - run before each commit
pre-commit:
  parallel: true
  commands:
    # Format Rust code
    rustfmt:
      glob: "*.rs"
      run: cargo fmt --check {staged_files}
    
    # Lint Rust code
    clippy:
      glob: "*.rs"
      run: cargo clippy -- -D warnings
    
    # Check .gitattributes validation
    gitattributes:
      run: |
        # Only run if .gitattributes exists and we have staged files
        if [[ -f ".gitattributes" ]] && [[ -n "$(git diff --cached --name-only)" ]]; then
          echo "🔍 Validating .gitattributes with hyperpolyglot..."
          
          # Get staged files
          STAGED_FILES=$(git diff --cached --name-only)
          
          # Check if any staged files need language detection
          if echo "$STAGED_FILES" | grep -E '\.[a-zA-Z0-9]+$' > /dev/null; then
            echo "📁 Found staged files with extensions, checking .gitattributes..."
            
            # Run hyperpolyglot on staged files
            MISSING_ENTRIES=""
            for file in $STAGED_FILES; do
              if [[ -f "$file" ]] && [[ "$file" =~ \.[a-zA-Z0-9]+$ ]]; then
                # Check if file has a linguist-language entry in .gitattributes
                if ! grep -q "^$file linguist-language=" .gitattributes; then
                  # Detect language with hyperpolyglot
                  LANGUAGE=$(hyply --breakdown "$file" 2>/dev/null | grep -E '^[0-9.]+%' | head -1 | awk '{print $2}')
                  if [[ -n "$LANGUAGE" ]]; then
                    MISSING_ENTRIES="$MISSING_ENTRIES\n$file (detected: $LANGUAGE)"
                  fi
                fi
              fi
            done
            
            if [[ -n "$MISSING_ENTRIES" ]]; then
              echo "⚠️  Files missing from .gitattributes:"
              echo -e "$MISSING_ENTRIES"
              echo ""
              echo "💡 To fix this, run:"
              echo "   ./scripts/generate-gitattributes.sh"
              echo "   git add .gitattributes"
              echo "   git commit --amend"
              exit 1
            else
              echo "✅ All staged files have .gitattributes entries"
            fi
          else
            echo "✅ No staged files with extensions to validate"
          fi
        else
          echo "✅ Skipping .gitattributes validation (no staged files or no .gitattributes)"
        fi
    
    # Validate file type policy (only .rs and .jsonc allowed, no shell files)
    file-type-policy:
      run: |
        echo "🔍 Validating file type policy..."
        
        # Get staged files
        STAGED_FILES=$(git diff --cached --name-only)
        
        if [[ -n "$STAGED_FILES" ]]; then
          # Run file type validation on staged files
          if ./scripts/validate-file-types.sh -s; then
            echo "✅ All staged files comply with file type policy"
          else
            echo "❌ File type policy violations found in staged files"
            echo "💡 Only .rs and .jsonc files are allowed. No shell files permitted."
            exit 1
          fi
        else
          echo "✅ No staged files to validate"
        fi

# Pre-push hooks - run before pushing
pre-push:
  parallel: true
  commands:
    # Validate .gitattributes is up to date
    gitattributes-sync:
      run: |
        echo "🔍 Checking .gitattributes sync with repository files..."
        
        if [[ -f ".gitattributes" ]]; then
          # Check if .gitattributes needs updating
          if ./scripts/ci-gitattributes.sh -c; then
            echo "✅ .gitattributes is up to date"
          else
            echo "⚠️  .gitattributes needs updating"
            echo "💡 Run: ./scripts/generate-gitattributes.sh"
            echo "💡 Or: ./scripts/ci-gitattributes.sh -f"
            exit 1
          fi
        else
          echo "⚠️  No .gitattributes file found"
          echo "💡 Run: ./scripts/generate-gitattributes.sh"
          exit 1
        fi
    
    # Run tests
    test:
      run: cargo test
    
    # Check for any remaining issues
    final-check:
      run: |
        echo "🔍 Final pre-push checks..."
        
        # Check for any uncommitted changes to .gitattributes
        if git diff --quiet .gitattributes 2>/dev/null; then
          echo "✅ .gitattributes is committed"
        else
          echo "⚠️  .gitattributes has uncommitted changes"
          echo "💡 Commit .gitattributes changes before pushing"
          exit 1
        fi

# Post-commit hooks - run after commit
post-commit:
  commands:
    # Show language statistics
    language-stats:
      run: |
        if [[ -f ".gitattributes" ]]; then
          echo "📊 Repository language statistics:"
          echo "=================================="
          
          # Count files by language from .gitattributes
          grep "linguist-language=" .gitattributes | \
            sed 's/.*linguist-language=//' | \
            sort | uniq -c | \
            sort -nr | \
            while read count language; do
              echo "$language: $count files"
            done
          
          echo ""
          echo "💡 Language detection powered by hyperpolyglot"
        fi
