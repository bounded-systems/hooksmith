pre-commit:
  hooksmith-fmt:
    run: cargo fmt --all -- --check
    files: '*.rs'
    parallel: false
    env: null
  hooksmith-test:
    run: cargo test --all-targets --all-features
    files: '*.rs'
    parallel: false
    env: null
  hooksmith-gen-wit:
    run: cargo xtask gen-wit
    files: '*.rs'
    parallel: false
    env: null
  hooksmith-clippy:
    run: cargo clippy --all-targets --all-features -- -D warnings
    files: '*.rs'
    parallel: false
    env: null
pre-push:
  hooksmith-check-generated:
    run: cargo xtask check --strict
    files: null
    parallel: false
    env: null
  hooksmith-audit:
    run: cargo audit
    files: null
    parallel: false
    env: null
post-push:
  verify-hooksmith:
    run: cargo run --bin hooksmith -- verify-hooks --check-installation
    files: null
    parallel: false
    env: null
commit-msg: null
