version: '3.8'

services:
  hooksmith:
    build:
      context: .
      dockerfile: Dockerfile
    image: hooksmith:latest
    container_name: hooksmith-dev
    volumes:
      # Mount workspace for development
      - .:/hooksmith
      # Mount Git config for hooks testing
      - ~/.gitconfig:/root/.gitconfig:ro
    environment:
      # GitHub Actions environment variables for act compatibility
      - GITHUB_WORKSPACE=/hooksmith
      - GITHUB_ACTIONS=true
      - ACT=true
    working_dir: /hooksmith
    entrypoint: ["/entrypoint.sh"]
    command: ["hooksmith", "--help"]
    # Enable interactive mode for development
    stdin_open: true
    tty: true

  # Service for running act with our optimized image
  act-runner:
    build:
      context: .
      dockerfile: Dockerfile
    image: hooksmith:act
    container_name: hooksmith-act
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - GITHUB_WORKSPACE=/workspace
    working_dir: /workspace
    entrypoint: ["/entrypoint.sh"]
    command: ["act", "--help"]
    # For act compatibility
    privileged: true
