# Cargo-deny configuration for security, compliance, and deterministic builds
# Industry-standard security and supply chain protection

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
]

[output]
feature-depth = 1

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"
notice = "warn"
ignore = [
    # Temporary ignores - review quarterly
    # Add specific RUSTSEC IDs when needed
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
    "LGPL-2.1",
    "LGPL-3.0",
]
copyleft = "deny"
allow-osi-fsf-free = "both"
default = "deny"

[[licenses.exceptions]]
allow = ["OpenSSL"]
name = "ring"

[licenses.private]
ignore = false
registries = []

[bans]
version = 2
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Known problematic crates for security/determinism
deny = [
    # Add specific problematic crates as discovered
]

# Multiple versions acceptable for these common crates
skip = [
    { name = "windows-sys" },
    { name = "windows_x86_64_msvc" },
    { name = "windows_x86_64_gnu" },
    { name = "windows_aarch64_msvc" },
    { name = "syn" },
    { name = "quote" },
    { name = "proc-macro2" },
    { name = "unicode-ident" },
]

skip-tree = [
    # Skip checking entire dependency trees if needed
]

[sources]
version = 2
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# Controlled git dependencies
allow-git = []

[sources.allow-org]
# Trusted GitHub organizations
github = []
gitlab = []
