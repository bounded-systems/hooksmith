# Cargo-deny configuration for dependency safety

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Temporarily allow security issues while we work on fixing them
ignore = [
    "RUSTSEC-2025-0021",  # gix-features SHA-1 collision
    "RUSTSEC-2024-0438",  # wasmtime Windows device filenames
    "RUSTSEC-2025-0046",  # wasmtime fd_renumber panic
    "RUSTSEC-2020-0168",  # mach unmaintained
    "RUSTSEC-2024-0436",  # paste unmaintained
    "RUSTSEC-2024-0359",  # gix-attributes unsound
    "RUSTSEC-2024-0442",  # wasmtime-jit-debug unsound
]

[licenses]
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
# Temporarily allow duplicate versions while we work on fixing them
multiple-versions = "warn"
highlight = "all" 
