# Hooksmith Cargo Configuration
# This config applies to all builds unless overridden

# Machine-specific tweaks: copy config.local.toml.example → config.local.toml
# (gitignored) and add `include = ["config.local.toml"]` here locally if you want
# them. Not hard-required, so fresh clones and CI build without it.

[build]
# Let Nix/CI set CARGO_TARGET_DIR; don't hardcode here
# rustflags here are okay for local dev; prefer env in CI for easy overrides
# rustflags = ["-Dwarnings"]  # Workspace lints (warnings = "deny") handle clean crates;
# hooksmith-core has intentional #[allow] suppression for WIP dead code that
# -Dwarnings on the CLI overrides. Tighten back once that crate is cleaned up.

# Use sparse protocol for faster dependency resolution
[registries.crates-io]
protocol = "sparse"

# Enable faster dependency resolution
[net]
git-fetch-with-cli = true
retry = 10

# Development environment
[env]
RUST_BACKTRACE = "1"

# Optimized profiles
[profile.release]
lto = "thin"
codegen-units = 16
panic = "abort"
strip = true

[profile.dev]
debug = 1
incremental = true
codegen-units = 256

[profile.test]
debug = 1
incremental = true
codegen-units = 256

# Workspace resolver
[workspace]
resolver = "2"

# Build aliases for common tasks
[alias]
# CI and quality checks
ci = "clippy --workspace --all-targets --all-features -- -D warnings"
check-all = "check --workspace --all-targets --all-features"
test-all = "test --workspace --all-targets --all-features"

# Development shortcuts
dev = "run -p gba"
build-all = "build --workspace"
test-watch = "watch -x 'test --workspace'"

# Documentation
docs = "doc --workspace --no-deps --open"

# Maintenance
clean-all = "clean && rm -rf target/"
update-all = "update"

# Xtask convenience
xtask = "run -p xtask --"
