[build]
# Enable incremental compilation by default
incremental = true

# Use LLD linker for faster linking (Linux)
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = [
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "link-arg=-Wl,--no-rosegment",
]

# Use zld linker for faster linking (macOS)
[target.x86_64-apple-darwin]
rustflags = [
    "-C", "link-arg=-fuse-ld=/usr/local/bin/zld",
]

# Enable parallel compilation frontend (nightly only)
[env]
RUSTFLAGS_NIGHTLY = "-Z threads=8"

# Profile-guided optimizations
[profile.release]
lto = "thin"
codegen-units = 16
panic = "abort"
strip = true

# Development profile optimizations
[profile.dev]
debug = 1
incremental = true
codegen-units = 256

# Test profile optimizations
[profile.test]
debug = 1
incremental = true
codegen-units = 256

# Benchmark profile
[profile.bench]
lto = "thin"
codegen-units = 1
panic = "abort"
strip = true

# Workspace optimization with cargo-hakari
[workspace]
resolver = "2"

# Enable faster dependency resolution
[net]
git-fetch-with-cli = true
