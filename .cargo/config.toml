[build]
# Enable parallel compilation
# jobs = 0  # This was causing issues, using default
# Use incremental compilation for faster rebuilds
incremental = true
# Build dependencies in parallel
dep-info-basedir = "target"

[target.wasm32-unknown-unknown]
# WASM target configuration
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=--no-entry",
    "-C", "link-arg=--export-table",
    "-C", "link-arg=--import-memory",
]

[target.wasm32-wasi]
# WASI target configuration
rustflags = [
    "-C", "target-feature=+crt-static",
]

[alias]
# Useful cargo aliases for development
# Note: fmt and clippy are handled by cargo-fmt and cargo-clippy tools, not as aliases
check = "check --all-targets --all-features"
test = "test --all-targets --all-features"
build = "build --all-targets --all-features"
doc = "doc --all-features --no-deps"
clean = "clean"
update = "update"
tree = "tree --all-features"
outdated = "outdated"
audit = "audit"
deny = "deny check"

# WASM-specific aliases
wasm-build = "build --target wasm32-unknown-unknown --release"
wasm-test = "test --target wasm32-unknown-unknown"
wasi-build = "build --target wasm32-wasi --release"
wasi-test = "test --target wasm32-wasi"

# Development workflow aliases
dev = "run"
dev-watch = "watch -x run"
test-watch = "watch -x test"
check-watch = "watch -x check"
clippy-watch = "watch -x clippy"

# Documentation aliases
docs = "doc --open"
docs-serve = "doc --no-deps --open"

# Code quality aliases
quality = "run --bin xtask -- code-stats"
quality-strict = "run --bin xtask -- code-stats --strict"
validate = "run --bin xtask -- contract-validate --validate-generated"
validate-strict = "run --bin xtask -- contract-validate --validate-generated --comprehensive"

[net]
# Git protocol configuration
git-fetch-with-cli = true

[registries.crates-io]
# Use sparse registry for faster dependency resolution
# protocol = "sparse+https://index.crates.io/"  # This was causing issues, using default

[profile.dev.package."*"]
# Optimize dependencies even in debug builds
opt-level = 3

[profile.release.package."*"]
# Optimize all dependencies in release builds
opt-level = 3 
