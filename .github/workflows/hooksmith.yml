# Generated GitHub Actions Workflow
# Generated by: xtask gen-github-actions
# Version: 1.0.0
# Description: Comprehensive GitHub Actions workflow for Hooksmith validation

name: Hooksmith

# Environment variable to control whether validation is enabled
env:
  ENABLE_HOOKSMITH_VALIDATION: true

permissions:
  pull-requests: read
  issues: read
  contents: read

on:
  push:
    types:
      - created
      - deleted
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
  workflow_dispatch:
  create:
    types:
      - tag
      - branch
  delete:
    types:
      - tag
      - branch
  fork:
  gollum:
  page_build:
  public:
  watch:
  issues:
    types:
      - opened
      - edited
      - closed
      - reopened
  issue_comment:
    types:
      - created
      - edited
      - deleted
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed
  pull_request_review_comment:
    types:
      - created
      - edited
      - deleted
  release:
    types:
      - created
      - edited
      - deleted
      - published
      - unpublished
  deployment:
  deployment_status:
  check_suite:
    types:
      - requested
      - rerequested
      - completed
  check_run:
    types:
      - created
      - rerequested
      - completed
      - requested_action
  status:
  discussion:
    types:
      - created
      - edited
      - deleted
      - transferred
      - pinned
      - unpinned
      - locked
      - unlocked
      - category_changed
      - answered
      - unanswered
  discussion_comment:
    types:
      - created
      - edited
      - deleted
  label:
    types:
      - created
      - edited
      - deleted
  milestone:
    types:
      - created
      - closed
      - opened
      - edited
      - deleted
  schedule:
    - cron: '0 0 * * *'
  repository_dispatch:
  registry_package:
    types:
      - published
      - updated
  branch_protection_rule:
    types:
      - created
      - updated
      - deleted

jobs:
  ubuntu-latest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch_depth: 0
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          path:
            - "target"
            - "~/.cargo/registry"
            - "~/.cargo/git"
          restore_keys:
            - "${{ runner.os }}-cargo-"
      - name: Build Hooksmith
        run: cargo build --release
      - name: Run Hooksmith Dispatch
        run: ./target/release/hooksmith-dispatch
