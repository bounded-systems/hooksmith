name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Build optimization environment variables
  RUSTC_WRAPPER: sccache
  SCCACHE_CACHE_SIZE: 20G
  SCCACHE_DIR: ${{ github.workspace }}/.cache/sccache
  CARGO_INCREMENTAL: 0

jobs:
  # Matrix build across Rust toolchains with optimizations
  test:
    name: Test (Rust ${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust:
          - stable
          - beta
          - 1.70.0  # MSRV
        include:
          - rust: stable
            toolchain: stable
          - rust: beta
            toolchain: beta
          - rust: 1.70.0
            toolchain: 1.70.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          profile: minimal
          override: true
          components: rustfmt, clippy

      - name: Install build optimization tools
        run: |
          # Install sccache for build caching
          cargo install sccache
          # Install cargo-hakari for workspace optimization
          cargo install cargo-hakari

          # Install cargo-nextest for faster testing
          cargo install cargo-nextest

      - name: Setup sccache
        run: |
          mkdir -p ${{ env.SCCACHE_DIR }}
          sccache --show-stats

      - name: Cache dependencies and build artifacts
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            ${{ env.SCCACHE_DIR }}
            .cargo/hakari/
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust }}-

      - name: Setup cargo-hakari
        run: |
          # Generate hakari.toml if it doesn't exist
          if [ ! -f "hakari.toml" ]; then
            cargo hakari generate
          fi
          cargo hakari update

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all -- -D warnings

      - name: Run tests with cargo-nextest
        run: cargo nextest run --all-targets --all-features --test-threads=$(nproc)

      - name: Build documentation
        run: cargo doc --no-deps --all

      - name: Check dependency safety
        if: matrix.rust == 'stable'
        run: |
          cargo install cargo-deny
          cargo deny check

      - name: Show build statistics
        if: always()
        run: |
          echo "📊 Build Performance Statistics:"
          echo "================================"
          sccache --show-stats
          echo
          echo "Cache usage:"
          du -sh ${{ env.SCCACHE_DIR }} || echo "sccache cache not found"

