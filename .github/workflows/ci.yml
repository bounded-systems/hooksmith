name: ci

# Minimal, honest CI for the clean-foundation workspace: format + build + test on
# the crates that actually compile. (The contract-validation / hook-engine workflows
# are parked in .github/workflows-disabled until the message-stream redesign rebuilds
# those crates — see the quarantine notes in Cargo.toml.)
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - name: System deps (git2 → openssl/zlib)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libssl-dev zlib1g-dev
      - name: Format
        run: cargo fmt --all --check
      - name: Build
        run: cargo check --workspace
      - name: Test
        run: cargo test --workspace
