          override: true

      - name: Run security audit
        run: |
          cargo install cargo-audit
          cargo audit --deny warnings

  # Build release artifacts
  build-release:
    name: Build release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
