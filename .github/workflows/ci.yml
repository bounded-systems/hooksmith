name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix-checks:
    name: Nix Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: hooksmith
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          
      - name: Check flake
        run: nix flake check --show-trace
        
      - name: Build all packages
        run: |
          nix build .#hooksmith-suite --show-trace
          nix build .#analysis-tools --show-trace
          nix build .#core-tools --show-trace
          nix build .#xtask --show-trace
          
      - name: Run pre-commit checks
        run: nix develop -c pre-commit run --all-files
        
      - name: Verify development environment
        run: |
          nix develop -c just --version
          nix develop -c cargo --version
          nix develop -c rustc --version

  devcontainer-test:
    name: DevContainer Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Test DevContainer build
        uses: devcontainers/ci@v0.3
        with:
          imageName: hooksmith-devcontainer
          runCmd: |
            nix --version
            just --version || echo "just not available yet"
            
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: hooksmith
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          
      - name: Check Nix formatting
        run: |
          nix develop -c alejandra --check .
          
      - name: Check for Nix issues
        run: |
          nix develop -c statix check .
          nix develop -c deadnix --check .
          
      - name: Check Rust formatting
        run: |
          nix develop -c cargo fmt --all -- --check
          
      - name: Run Clippy
        run: |
          nix develop -c cargo clippy --all-targets --all-features -- -D warnings

  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: hooksmith
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          
      - name: Build documentation
        run: |
          nix develop -c cargo doc --all --no-deps
          
      - name: Test documentation examples
        run: |
          nix develop -c cargo test --doc

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: hooksmith
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          
      - name: Run unit tests
        run: |
          nix develop -c cargo test --all
          
      - name: Run integration tests
        run: |
          nix develop -c cargo test --all --test '*'
          
      - name: Test analysis tools
        run: |
          nix run .#repository_size_auditor -- --help
          nix run .#rust_blob_analyzer -- --help || true
          nix run .#git_delta_analyzer -- --help || true

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: hooksmith
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          
      - name: Install security tools
        run: |
          # Install Syft for SBOM generation
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          
          # Install Grype for vulnerability scanning
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          
          # Install Trivy for comprehensive security scanning
          sudo apt-get update
          sudo apt-get install wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy
          
      - name: Cargo security audit
        run: |
          nix develop -c cargo audit --json > cargo-audit.json || true
          nix develop -c cargo audit
          
      - name: Cargo deny check
        run: |
          nix develop -c cargo deny check licenses
          nix develop -c cargo deny check bans
          nix develop -c cargo deny check advisories
          nix develop -c cargo deny check sources
          
      - name: Generate SBOM
        run: |
          # Generate SPDX SBOM
          syft packages dir:. -o spdx-json=sbom.spdx.json
          
          # Generate CycloneDX SBOM
          syft packages dir:. -o cyclonedx-json=sbom.cyclonedx.json
          
          # Cargo-specific SBOM
          syft packages Cargo.lock -o spdx-json=cargo-sbom.spdx.json
          
      - name: Vulnerability scanning with Grype
        run: |
          # Scan source code
          grype dir:. -o json > grype-scan.json || true
          grype dir:. -o table > grype-scan.txt || true
          
          # Scan SBOM
          grype sbom:sbom.spdx.json -o json > grype-sbom-scan.json || true
          
      - name: Trivy security scan
        run: |
          # Filesystem scan
          trivy fs --format json --output trivy-fs.json . || true
          trivy fs --format table . || true
          
          # Repository scan
          trivy repo --format json --output trivy-repo.json . || true
          
      - name: Secret scanning
        run: |
          # Install gitleaks
          git clone https://github.com/gitleaks/gitleaks.git
          cd gitleaks
          make build
          sudo mv gitleaks /usr/local/bin/
          cd ..
          rm -rf gitleaks
          
          # Scan for secrets
          gitleaks detect --source . --report-format json --report-path gitleaks.json || true
          gitleaks detect --source . --report-format csv --report-path gitleaks.csv || true
          
      - name: License compliance check
        run: |
          # Generate license report
          nix develop -c cargo deny list --format json > licenses.json
          
          # Check for GPL and other restrictive licenses
          if grep -q "GPL\|AGPL\|LGPL" licenses.json; then
            echo "❌ Restrictive licenses found"
            exit 1
          else
            echo "✅ License compliance check passed"
          fi
          
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            *.json
            *.txt
            *.csv
          retention-days: 30
          
      - name: Security summary
        if: always()
        run: |
          echo "## 🛡️ Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Cargo audit results
          if [ -f cargo-audit.json ]; then
            VULNERABILITIES=$(jq '.vulnerabilities.found | length' cargo-audit.json 2>/dev/null || echo "0")
            echo "**Cargo Audit:** $VULNERABILITIES vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Grype results
          if [ -f grype-scan.json ]; then
            HIGH_VULNS=$(jq '.matches[] | select(.vulnerability.severity == "High") | length' grype-scan.json 2>/dev/null | wc -l || echo "0")
            CRITICAL_VULNS=$(jq '.matches[] | select(.vulnerability.severity == "Critical") | length' grype-scan.json 2>/dev/null | wc -l || echo "0")
            echo "**Grype Scan:** $CRITICAL_VULNS critical, $HIGH_VULNS high severity vulnerabilities" >> $GITHUB_STEP_SUMMARY
          fi
          
          # License compliance
          echo "**License Compliance:** ✅ Passed (no restrictive licenses)" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Detailed reports available in artifacts" >> $GITHUB_STEP_SUMMARY

  macos-test:
    name: macOS Test
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: hooksmith
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          
      - name: Build on macOS
        run: |
          nix build .#hooksmith-suite --show-trace
          
      - name: Test development environment on macOS
        run: |
          nix develop -c just --version
          nix develop -c cargo --version
