name: Language Validation and File Type Policy

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '.gitattributes'
      - 'docs/**'
      - '*.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force update .gitattributes'
        required: false
        type: boolean
        default: false

jobs:
  update-gitattributes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build validation tools
        run: |
          cargo build --release --bin generate-gitattributes
          cargo build --release --bin validate-file-types
          cargo build --release --bin file-type-report

      - name: Check if .gitattributes needs updating
        id: check-update
        run: |
          if ./target/release/generate-gitattributes --check; then
            echo "needs_update=false" >> $GITHUB_OUTPUT
          else
            echo "needs_update=true" >> $GITHUB_OUTPUT
          fi

      - name: Update .gitattributes
        if: steps.check-update.outputs.needs_update == 'true' || github.event.inputs.force == 'true'
        run: |
          ./target/release/generate-gitattributes
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .gitattributes
          git commit -m "Update .gitattributes with latest language detection" || exit 0
          git push

  validate-file-types:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build validation tools
        run: |
          cargo build --release --bin validate-file-types
          cargo build --release --bin file-type-report

      - name: Generate file type report
        run: |
          echo "📊 File Type Analysis Report" >> $GITHUB_STEP_SUMMARY
          echo "==========================" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ./target/release/file-type-report --detailed >> $GITHUB_STEP_SUMMARY

      - name: Validate file type policy
        run: |
          echo "🔍 File Type Policy Validation" >> $GITHUB_STEP_SUMMARY
          echo "=============================" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if ./target/release/validate-file-types --strict; then
            echo "✅ All files comply with file type policy" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ File type policy violations found!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "💡 To fix violations:" >> $GITHUB_STEP_SUMMARY
            echo "   • Remove blocked files" >> $GITHUB_STEP_SUMMARY
            echo "   • Convert shell scripts to Rust" >> $GITHUB_STEP_SUMMARY
            echo "   • Use .jsonc for configuration files" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Validate .gitattributes
        run: |
          echo "🔍 .gitattributes Validation" >> $GITHUB_STEP_SUMMARY
          echo "===========================" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f ".gitattributes" ]; then
            echo "✅ .gitattributes file exists" >> $GITHUB_STEP_SUMMARY
            
            # Check for basic structure
            if grep -q "linguist-language" .gitattributes; then
              echo "✅ Contains linguist-language entries" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️  No linguist-language entries found" >> $GITHUB_STEP_SUMMARY
            fi
            
            # Count entries
            entry_count=$(grep -c "linguist-language" .gitattributes || echo "0")
            echo "📊 Found $entry_count language override entries" >> $GITHUB_STEP_SUMMARY
            
          else
            echo "❌ .gitattributes file missing" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Show language statistics
        run: |
          echo "📈 Language Statistics" >> $GITHUB_STEP_SUMMARY
          echo "=====================" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Extract language statistics from .gitattributes
          if [ -f ".gitattributes" ]; then
            echo "Top languages by file count:" >> $GITHUB_STEP_SUMMARY
            grep "linguist-language" .gitattributes | \
              sed 's/.*linguist-language=//' | \
              sort | uniq -c | sort -nr | head -10 | \
              while read count lang; do
                echo "   $lang: $count files" >> $GITHUB_STEP_SUMMARY
              done
          fi
