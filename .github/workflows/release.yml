name: SLSA Release Build

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        required: true
        type: string

permissions:
  contents: read

jobs:
  # SLSA Level 3 compliant build
  slsa-build:
    name: SLSA Level 3 Build
    permissions:
      id-token: write   # For OIDC token generation
      contents: write   # For release uploads
      attestations: write  # For generating attestations
    runs-on: ubuntu-latest
    
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.image.outputs.digest }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # Full history for reproducible builds
          
      - name: Install Nix
        uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b # v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/ https://hooksmith.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= hooksmith.cachix.org-1:YOUR_CACHE_KEY_HERE
            
      - name: Setup Cachix
        uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
        with:
          name: hooksmith
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          
      - name: Set build environment
        run: |
          # Set reproducible timestamp
          echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> $GITHUB_ENV
          echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
          
      - name: Build deterministic binaries
        run: |
          # Hermetic build with Nix
          nix build .#hooksmith-suite --print-build-logs --show-trace
          nix build .#analysis-tools --print-build-logs --show-trace
          
          # Create release directory
          mkdir -p release/
          
          # Copy binaries with consistent naming
          cp -r result/bin/* release/
          
          # Generate build manifest
          cat > release/build-manifest.json << EOF
          {
            "version": "${{ env.RELEASE_VERSION }}",
            "build_date": "${{ env.BUILD_DATE }}",
            "source_date_epoch": "${{ env.SOURCE_DATE_EPOCH }}",
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "nix_hash": "$(nix hash path result)",
            "builder": "github-actions",
            "workflow_run_id": "${{ github.run_id }}"
          }
          EOF
          
      - name: Generate checksums
        id: hash
        run: |
          cd release
          
          # Generate multiple hash formats for maximum compatibility
          sha256sum * > checksums-sha256.txt
          sha512sum * > checksums-sha512.txt
          b2sum * > checksums-blake2b.txt
          
          # Create combined hash for SLSA provenance
          cat checksums-sha256.txt checksums-sha512.txt checksums-blake2b.txt > all-checksums.txt
          
          # Output hashes in SLSA format
          echo "hashes=$(sha256sum * | base64 -w0)" >> $GITHUB_OUTPUT
          
      - name: Create tarball
        run: |
          cd release
          tar czf ../hooksmith-${{ env.RELEASE_VERSION }}-linux-x86_64.tar.gz *
          
      - name: Attest build provenance (SLSA, GitHub-native)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: 'hooksmith-${{ env.RELEASE_VERSION }}-linux-x86_64.tar.gz'

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-artifacts
          path: |
            hooksmith-*.tar.gz
            release/
          retention-days: 90
          
      # Generate Software Bill of Materials (SBOM)
      - name: Generate SBOM
        run: |
          # Install syft for SBOM generation
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          
          # Generate SPDX SBOM
          syft packages dir:. -o spdx-json=release/hooksmith-sbom.spdx.json
          
          # Generate CycloneDX SBOM
          syft packages dir:. -o cyclonedx-json=release/hooksmith-sbom.cyclonedx.json
          
          # Add Cargo.lock analysis
          if [ -f Cargo.lock ]; then
            syft packages Cargo.lock -o spdx-json=release/cargo-sbom.spdx.json
          fi
          
      - name: Security scan
        run: |
          # Install grype for vulnerability scanning
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          
          # Scan for vulnerabilities
          grype dir:. -o json > release/vulnerability-report.json || true
          grype dir:. -o table > release/vulnerability-report.txt || true

  # Code signing with Sigstore
  sign-artifacts:
    name: Sign Artifacts
    needs: [slsa-build]
    permissions:
      id-token: write
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-artifacts
          
      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
        
      - name: Sign artifacts with Sigstore
        run: |
          # Sign all artifacts
          for file in hooksmith-*.tar.gz release/*.json release/*.txt; do
            if [ -f "$file" ]; then
              cosign sign-blob --yes "$file" --output-signature "${file}.sig" --output-certificate "${file}.crt"
            fi
          done
          
      - name: Upload signed artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: signed-artifacts
          path: |
            *.sig
            *.crt
            release/*.sig
            release/*.crt

  # Multi-architecture builds
  build-cross-platform:
    name: Cross-platform builds
    needs: [slsa-build]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive-name: hooksmith-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive-name: hooksmith-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            archive-name: hooksmith-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            archive-name: hooksmith-macos-aarch64
            
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          
      - name: Install Nix
        uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b # v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Cachix
        uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
        with:
          name: hooksmith
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          
      - name: Build for target
        run: |
          # Cross-compilation with Nix
          nix build .#hooksmith-suite --system ${{ matrix.target }} --print-build-logs || \
          nix build .#hooksmith-suite --print-build-logs  # Fallback for unsupported targets
          
          # Package for release
          mkdir -p dist
          cp -r result/bin/* dist/
          tar czf ${{ matrix.archive-name }}.tar.gz -C dist .
          
      - name: Upload cross-platform artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.archive-name }}
          path: ${{ matrix.archive-name }}.tar.gz

  # Final release publication
  publish-release:
    name: Publish Release
    needs: [slsa-build, sign-artifacts, build-cross-platform]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'push'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        
      - name: Prepare release assets
        run: |
          mkdir -p release-final
          
          # Collect all artifacts
          find . -name "*.tar.gz" -exec cp {} release-final/ \;
          find . -name "*.json" -exec cp {} release-final/ \;
          find . -name "*.txt" -exec cp {} release-final/ \;
          find . -name "*.sig" -exec cp {} release-final/ \;
          find . -name "*.crt" -exec cp {} release-final/ \;
          
          # Create release notes
          cat > release-final/RELEASE_NOTES.md << EOF
          # Hooksmith Release ${GITHUB_REF#refs/tags/}
          
          ## Security and Compliance
          - ✅ SLSA Level 3 compliant build
          - ✅ Signed with Sigstore (keyless signing)
          - ✅ SBOM included (SPDX and CycloneDX formats)
          - ✅ Vulnerability scan report included
          - ✅ Reproducible builds with Nix
          
          ## Artifacts
          - Multi-architecture binaries (Linux x86_64/aarch64, macOS x86_64/aarch64)
          - Complete checksums (SHA256, SHA512, BLAKE2b)
          - SLSA provenance attestations
          - Software Bill of Materials
          - Security scan reports
          
          ## Verification
          \`\`\`bash
          # Verify signatures with cosign
          cosign verify-blob --certificate hooksmith-*.crt --signature hooksmith-*.sig hooksmith-*.tar.gz
          
          # Verify checksums
          sha256sum -c checksums-sha256.txt
          \`\`\`
          EOF
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release-final/*
          body_path: release-final/RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
