name: Update .gitattributes

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - .gitattributes
      - docs/**
      - '*.md'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - .gitattributes
      - docs/**
      - '*.md'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-gitattributes:
    name: Update .gitattributes
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better git operations
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install hyperpolyglot
        run: cargo install hyperpolyglot
      
      - name: Check if .gitattributes needs updating
        id: check
        run: |
          # Set CI environment variable
          export CI=true
          
          # Run check-only mode
          if ./scripts/ci-gitattributes.sh -c; then
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "✅ .gitattributes is up to date"
          else
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "⚠️  .gitattributes needs updating"
          fi
      
      - name: Update .gitattributes
        if: steps.check.outputs.needs_update == 'true'
        run: |
          export CI=true
          ./scripts/ci-gitattributes.sh -f
      
      - name: Show changes
        if: steps.check.outputs.needs_update == 'true'
        run: |
          echo "📊 Changes made to .gitattributes:"
          if [[ -f ".gitattributes.backup" ]]; then
            echo "Diff with previous version:"
            diff -u .gitattributes.backup .gitattributes || true
          else
            echo "New .gitattributes file created"
            head -20 .gitattributes
          fi
      
      - name: Commit changes
        if: steps.check.outputs.needs_update == 'true'
        run: |
          # Configure git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add the updated .gitattributes
          git add .gitattributes
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            # Commit the changes
            git commit -m "Update .gitattributes with latest file types

            - Auto-generated by hyperpolyglot
            - Updated language detection for repository files
            - Generated by GitHub Actions workflow"
            
            # Push the changes
            git push
          fi
      
      - name: Create PR (if needed)
        if: github.event_name == 'workflow_dispatch' && steps.check.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: Update .gitattributes with latest file types
          title: 🤖 Auto-update .gitattributes
          body: |
            ## Auto-generated .gitattributes update
            
            This PR updates the `.gitattributes` file with the latest file type detection using hyperpolyglot.
            
            ### Changes made:
            - Updated language detection for repository files
            - Generated by GitHub Actions workflow
            - Uses hyperpolyglot for accurate language detection
            
            ### Files changed:
            - `.gitattributes` - Updated with latest file types
            
            ---
            *This PR was automatically generated by the GitHub Actions workflow.*
          branch: update-gitattributes-${{ github.run_id }}
          delete-branch: true
          labels: |
            automation
            gitattributes
            hyperpolyglot
