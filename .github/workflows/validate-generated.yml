name: Validate Generated Files

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate-generated:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
        
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
          
    - name: Install cargo-eval
      run: cargo install cargo-eval
      
    - name: Build xtask
      run: cargo build -p xtask
      
    - name: Validate files against strict extension policy
      run: |
        echo "🔍 Validating files against strict extension policy..."
        cargo run -p xtask -- validate-files --strict --verbose
        
    - name: Validate generated files against registry
      run: |
        echo "🔍 Validating generated files against registry..."
        cargo run -p xtask -- validate-generated-unified --strict --verbose
        
    - name: Run regeneration consistency check
      run: |
        echo "🔄 Running regeneration consistency check..."
        cargo run -p xtask -- regen-check --strict --verbose
        
    - name: Validate checksums
      run: |
        echo "🔍 Validating file checksums..."
        cargo run -p xtask -- validate-checksums --strict
        
    - name: Check for uncommitted changes
      run: |
        echo "🔍 Checking for uncommitted changes..."
        if [ -n "$(git status --porcelain)" ]; then
          echo "❌ Found uncommitted changes:"
          git status --porcelain
          exit 1
        else
          echo "✅ No uncommitted changes found"
        fi 
