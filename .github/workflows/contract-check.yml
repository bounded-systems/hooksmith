name: Contract Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  contract-check:
    name: Contract Validation & Status Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for trend tracking
      
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Install xtask
        run: cargo install --path xtask
      
      - name: Run comprehensive contract check
        run: cargo xtask contract-check --strict --trend
      
      - name: Generate status report for PR
        if: github.event_name == 'pull_request'
        run: |
          cargo xtask status migration-progress --format markdown > status-report.md
          echo "## 📊 Hooksmith Contract Status Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat status-report.md >> $GITHUB_STEP_SUMMARY
      
      - name: Comment PR with status report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const statusReport = fs.readFileSync('status-report.md', 'utf8');
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔗 Hooksmith Contract Status Report\n\n${statusReport}\n\n---\n*This report was automatically generated by the contract check system.*`
            });
      
      - name: Upload trend data as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-trends
          path: status-trends/
          retention-days: 30

  # Optional: Additional validation jobs
  validate-generated:
    name: Validate Generated Files
    runs-on: ubuntu-latest
    needs: contract-check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Validate generated files
        run: cargo xtask validate-generated --strict
      
      - name: Check file type budget
        run: cargo xtask status file-types --format json

  # Optional: Generate migration scripts for review
  generate-migration-scripts:
    name: Generate Migration Scripts
    runs-on: ubuntu-latest
    needs: contract-check
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Generate migration scripts
        run: cargo xtask status generate-migration-scripts --all-types
      
      - name: Upload migration scripts as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: migration-scripts
          path: migration-scripts/
          retention-days: 7 