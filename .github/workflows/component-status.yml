name: Component Status Check
on:
  workflow_dispatch:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  check-component-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-wasip2
          override: true

      - name: Install cargo-component
        run: |
          cargo install cargo-component --git https://github.com/bytecodealliance/cargo-component --tag v0.5.0

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build xtask
        run: cargo build -p xtask

      - name: Check component status
        run: cargo run -p xtask -- component-status --format json

      - name: Check component status (verbose)
        run: cargo run -p xtask -- component-status --verbose --format table
        continue-on-error: true

      - name: Upload status report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: component-status-report
          path: |
            component-status-*.json
            component-status-*.csv
          retention-days: 7

  validate-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate component registry
        run: |
          # Check if registry file exists and is valid JSONC
          if [ ! -f "config/component-registry.jsonc" ]; then
            echo "❌ Component registry file not found"
            exit 1
          fi
          
          # Validate JSONC format (basic check)
          if ! grep -q '"metadata"' config/component-registry.jsonc; then
            echo "❌ Invalid component registry format"
            exit 1
          fi
          
          echo "✅ Component registry validation passed"

      - name: Check registry completeness
        run: |
          # Check if all WIT components have corresponding directories
          echo "Checking WIT component directories..."
          while IFS= read -r line; do
            if [[ $line =~ \"path\":[[:space:]]*\"([^\"]+)\" ]]; then
              path="${BASH_REMATCH[1]}"
              if [ ! -d "$path" ]; then
                echo "❌ WIT component directory not found: $path"
                exit 1
              fi
              echo "✅ Found WIT component: $path"
            fi
          done < <(grep '"path"' config/component-registry.jsonc)

      - name: Check native crate directories
        run: |
          # Check if all native crates have corresponding directories
          echo "Checking native crate directories..."
          while IFS= read -r line; do
            if [[ $line =~ \"path\":[[:space:]]*\"([^\"]+)\" ]]; then
              path="${BASH_REMATCH[1]}"
              if [ ! -d "$path" ]; then
                echo "❌ Native crate directory not found: $path"
                exit 1
              fi
              echo "✅ Found native crate: $path"
            fi
          done < <(grep '"path"' config/component-registry.jsonc)

  build-components:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [git-filter, hook-builder, validation-handler, worktree-runner]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-wasip2
          override: true

      - name: Install cargo-component
        run: |
          cargo install cargo-component --git https://github.com/bytecodealliance/cargo-component --tag v0.5.0

      - name: Build WIT component
        run: |
          echo "Building ${{ matrix.component }}..."
          cargo component build -p ${{ matrix.component }} --target wasm32-wasip2 --release
          echo "✅ ${{ matrix.component }} built successfully"

      - name: Upload component artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.component }}-wasm
          path: target/wasm32-wasip2/release/${{ matrix.component }}.component.wasm
          retention-days: 30

  test-native-crates:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate: [cli-core, file-operations, git-operations, lefthook-rs, xtask, event-types, file-system-handler]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Check native crate
        run: |
          echo "Checking ${{ matrix.crate }}..."
          cargo check -p ${{ matrix.crate }}
          echo "✅ ${{ matrix.crate }} check passed"

      - name: Test native crate
        run: |
          echo "Testing ${{ matrix.crate }}..."
          cargo test -p ${{ matrix.crate }}
          echo "✅ ${{ matrix.crate }} tests passed"

  status-summary:
    runs-on: ubuntu-latest
    needs: [check-component-status, validate-registry, build-components, test-native-crates]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-wasip2
          override: true

      - name: Install cargo-component
        run: |
          cargo install cargo-component --git https://github.com/bytecodealliance/cargo-component --tag v0.5.0

      - name: Generate final status report
        run: |
          echo "🔍 Final Component Status Summary"
          echo "=================================="
          echo "Build Components: ${{ needs.build-components.result }}"
          echo "Test Native Crates: ${{ needs.test-native-crates.result }}"
          echo "Registry Validation: ${{ needs.validate-registry.result }}"
          echo "Status Check: ${{ needs.check-component-status.result }}"
          
          # Generate detailed report
          cargo run -p xtask -- component-status --format table

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            let statusReport = '## 🔍 Component Status Check Results\n\n';
            
            // Add job results
            statusReport += '### Job Results\n';
            statusReport += `- ✅ Build Components: ${context.job === 'success' ? 'PASSED' : 'FAILED'}\n`;
            statusReport += `- ✅ Test Native Crates: ${context.job === 'success' ? 'PASSED' : 'FAILED'}\n`;
            statusReport += `- ✅ Registry Validation: ${context.job === 'success' ? 'PASSED' : 'FAILED'}\n`;
            statusReport += `- ✅ Status Check: ${context.job === 'success' ? 'PASSED' : 'FAILED'}\n\n`;
            
            // Add summary
            if (context.job === 'success') {
              statusReport += '🎉 All components are building and testing successfully!\n';
            } else {
              statusReport += '⚠️ Some components have issues that need attention.\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: statusReport
            }); 
