[package]
name = "hooksmith"
version = "0.1.0"
edition = "2021"
authors = ["Hooksmith Team"]
description = "CLI tool for building Rust binaries into Lefthook hooks with WASM components"
license = "MIT"
documentation = "https://docs.rs/hooksmith"
repository = "https://github.com/bdelanghe/hooksmith"
keywords = ["cli", "hooks", "lefthook", "wasm", "git"]
categories = ["command-line-utilities", "development-tools"]

[workspace]
members = [
    ".",
    "components/cli-core",
    "components/worktree-runner",
    "components/git-filter",
    "components/hook-builder",
    "lefthook-rs",
    "xtask",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Hooksmith Team"]
license = "MIT"

[workspace.dependencies]
# CLI framework
clap = { version = "4.0", features = ["derive"] }
tokio = { version = "1.0", features = ["full"] }
anyhow = "1.0"
console = "0.15"
indicatif = "0.17"

# File system and paths
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
toml = "0.8"

# Git operations
git2 = "0.18"

# Process and command execution
which = "5.0"

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

# Documentation
rustdoc-stripper = "0.1"

# WASM and WIT support
wasmtime = "18.0"
wit-bindgen = "0.20"
wasmtime-wasi = "18.0"
wit-parser = "0.12"
wit-component = "0.12"
wat = "1.0"
wasmparser = "0.120"

# Time and date handling
chrono = { version = "0.4", features = ["serde"] }

# JSON Schema validation
jsonschema = "0.17"
reqwest = { version = "0.11", features = ["json"] }

# Cryptographic hashing
sha2 = "0.10"

[[bin]]
name = "hooksmith"
path = "src/main.rs"

[lib]
name = "hooksmith"
path = "src/lib.rs"

[dependencies]
# CLI dependencies
clap.workspace = true
tokio.workspace = true
anyhow.workspace = true
console.workspace = true
indicatif.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true
toml.workspace = true
git2.workspace = true
which.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true

# Internal component dependencies
cli-core = { path = "components/cli-core" }
git-filter = { path = "components/git-filter" }

# WASM dependencies
wasmtime.workspace = true
wit-bindgen.workspace = true
wasmtime-wasi.workspace = true

# Time and date handling
chrono.workspace = true

# JSON Schema validation
jsonschema.workspace = true
reqwest.workspace = true

# Cryptographic hashing
sha2.workspace = true

[dev-dependencies]
tempfile = "3.0"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
