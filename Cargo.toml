[package]
name = "pushd-worktree-cli"
version = "0.1.0"
edition = "2021"
authors = ["Pushd Team"]
description = "CLI tools for Git worktree management and safety"
license = "MIT"

[workspace]
members = [
    ".",
    "components/cli-core",
    "components/worktree-manager",
    "components/git-validator",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Pushd Team"]
license = "MIT"

[workspace.dependencies]
# CLI framework
clap = { version = "4.0", features = ["derive"] }
tokio = { version = "1.0", features = ["full"] }
anyhow = "1.0"
console = "0.15"
indicatif = "0.17"

# File system and paths
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Git operations
git2 = "0.18"

# Process and command execution
which = "5.0"

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

[[bin]]
name = "pushd-worktree-cli"
path = "src/main.rs"

[lib]
name = "pushd_worktree_cli"
path = "src/lib.rs"

[dependencies]
# CLI dependencies
clap.workspace = true
tokio.workspace = true
anyhow.workspace = true
console.workspace = true
indicatif.workspace = true
serde.workspace = true
serde_json.workspace = true
toml.workspace = true
git2.workspace = true
which.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true

# Internal component dependencies
cli-core = { path = "components/cli-core" }
worktree-manager = { path = "components/worktree-manager" }
git-validator = { path = "components/git-validator" }

[dev-dependencies]
tempfile = "3.0"
