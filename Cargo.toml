[package]
name = "hooksmith"
version = "0.1.0"
edition = "2021"
authors = ["Pushd Team"]
description = "CLI tools for Git worktree management and safety"
license = "MIT"

[workspace]
members = [
    ".",
    "crates/components/cli-core",
    "crates/components/worktree-runner",
    "crates/xtask",
    "scripts/ensure-clean-main",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Pushd Team"]
license = "MIT"

[workspace.dependencies]
# CLI framework
clap = { version = "4.0", features = ["derive"] }
tokio = { version = "1.0", features = ["full"] }
anyhow = "1.0"
console = "0.15"
indicatif = "0.17"

# File system and paths
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
toml = "0.8"

# Git operations
git2 = "0.18"

# Process and command execution
which = "5.0"

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

# Documentation
rustdoc-stripper = "0.1"

# WASM and WIT support
wasmtime = "18.0"
wit-bindgen = "0.20"
wasmtime-wasi = "18.0"
wit-parser = "0.12"
wit-component = "0.236"
wat = "1.0"
wasmparser = "0.120"
once_cell = "1.19"

# Time and date handling
chrono = { version = "0.4", features = ["serde"] }

# JSON Schema validation
jsonschema = "0.17"
schemars = "0.8"
reqwest = { version = "0.11", features = ["json"] }

# Cryptographic hashing
sha2 = "0.10"
hex = "0.4"

# Error handling
thiserror = "1.0"

# File system utilities
tempfile = "3.0"

# Async runtime
regex = "1.0"
futures-io = "0.3"

# Additional dependencies
uuid = { version = "1.0", features = ["v4"] }

[[bin]]
name = "hooksmith"
path = "src/main.rs"

[lib]
name = "hooksmith"
path = "src/lib.rs"

[dependencies]
# CLI dependencies
clap.workspace = true
tokio.workspace = true
anyhow.workspace = true
console.workspace = true
indicatif.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true
toml.workspace = true
git2.workspace = true
which.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true

# Time and date handling
chrono.workspace = true

# JSON Schema validation
jsonschema.workspace = true
schemars.workspace = true

# Cryptographic hashing
sha2.workspace = true

# Error handling
thiserror.workspace = true

# Async runtime
regex.workspace = true

# Additional dependencies
uuid.workspace = true

# WASM and WIT support
wasmtime.workspace = true

# Internal component dependencies
cli-core = { path = "crates/components/cli-core" }
event-types = { path = "crates/event-types" }

[dev-dependencies]
tempfile = "3.0"
