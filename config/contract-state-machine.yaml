# Contract State Machine Definition
# This file defines the states, transitions, and validation rules for the contract validation pipeline

version: "1.0"
description: "Schema-driven state machine for contract validation with proof mechanisms"

# State definitions
states:
  UNTRACKED:
    description: "File has no contract or codegen attribute"
    allowed_transitions: ["UNVALIDATED"]
    validation_rules:
      - "File must exist in repository"
      - "No contract attributes set"
    
  UNVALIDATED:
    description: "File has contract/codegen attribute but no proof"
    allowed_transitions: ["VALIDATED"]
    validation_rules:
      - "File must have contract attribute in .gitattributes"
      - "No Git note exists for this file"
      - "File content must be readable"
    
  VALIDATED:
    description: "File has contract/codegen attribute + matching note with hash"
    allowed_transitions: ["LOCKED", "UNVALIDATED"]
    validation_rules:
      - "Git note must exist with valid state"
      - "File hash must match note hash"
      - "Contract validation must pass"
      - "Timestamp must be recent (within 30 days)"
    
  LOCKED:
    description: "File is validated + no further modifications allowed"
    allowed_transitions: ["UNVALIDATED"]
    validation_rules:
      - "File must be in VALIDATED state"
      - "No modifications allowed without re-validation"
      - "Parent scope must be validated"

# Transition definitions
transitions:
  detect_contract:
    from: ["UNTRACKED"]
    to: "UNVALIDATED"
    action: "Tag file via .gitattributes"
    trigger: "File modification detected"
    validation:
      - "File must exist"
      - "Contract attribute must be set"
      - "No existing Git note"
    
  validate_contract:
    from: ["UNVALIDATED"]
    to: "VALIDATED"
    action: "Run validator → create Git note with hash"
    trigger: "Manual validation or CI"
    validation:
      - "Contract validation must pass"
      - "Hash must be computed correctly"
      - "Git note must be created"
      - "Parent scope must be validated"
    
  lock_contract:
    from: ["VALIDATED"]
    to: "LOCKED"
    action: "Post-hook marks file as locked"
    trigger: "Post-validation hook"
    validation:
      - "File must be in VALIDATED state"
      - "No validation errors"
      - "All parent scopes validated"
    
  modify_contract:
    from: ["LOCKED"]
    to: "UNVALIDATED"
    action: "Changing file invalidates proof"
    trigger: "File modification"
    validation:
      - "File content must have changed"
      - "Hash must be different"
      - "Git note must be updated"
    
  regen_codegen:
    from: ["UNVALIDATED"]
    to: "VALIDATED"
    action: "Regenerate codegen + hash-check"
    trigger: "Code generation"
    validation:
      - "Code generation must succeed"
      - "Generated content must be valid"
      - "Hash must match generated content"
    
  release_proof:
    from: ["VALIDATED", "LOCKED"]
    to: ["VALIDATED", "LOCKED"]
    action: "CI verifies Merkle hashes and proof chain"
    trigger: "Release process"
    validation:
      - "All Merkle proofs must be valid"
      - "Proof chain must be complete"
      - "No validation errors in repository"

# Contract types and their validation rules
contract_types:
  blob:
    description: "File content validation"
    validation_steps:
      - "Character-level validation"
      - "Line-level validation"
      - "File-level validation"
    metadata_fields:
      - "line_count"
      - "char_contracts"
      - "validation_errors"
      - "file_size"
      - "encoding"
    
  tree:
    description: "Directory structure validation"
    validation_steps:
      - "Entry validation"
      - "Mode validation"
      - "Tree structure validation"
    metadata_fields:
      - "entry_count"
      - "directory_count"
      - "file_count"
      - "total_size"
    
  commit:
    description: "Commit metadata validation"
    validation_steps:
      - "Tree reference validation"
      - "Parent validation"
      - "Author/committer validation"
      - "Message validation"
    metadata_fields:
      - "parent_count"
      - "message_length"
      - "author_email"
      - "committer_email"
    
  tag:
    description: "Tag object validation"
    validation_steps:
      - "Object reference validation"
      - "Tag name validation"
      - "Tagger validation"
      - "Message validation"
    metadata_fields:
      - "tag_name"
      - "object_type"
      - "message_length"
      - "tagger_email"

# Merkle tree configuration
merkle_tree:
  hash_algorithm: "sha256"
  max_depth: 32
  leaf_size: 1024  # bytes
  scope_hierarchy:
    - "char"
    - "line"
    - "chunk"
    - "file"
    - "directory"
    - "repository"

# Git notes configuration
git_notes:
  refs:
    contracts: "refs/notes/contracts"
    transitions: "refs/notes/contracts-log"
    merkle_proofs: "refs/notes/merkle-proofs"
  retention:
    max_transitions: 1000
    max_age_days: 365
    cleanup_interval_hours: 24

# Validation thresholds
validation_thresholds:
  max_file_size_mb: 100
  max_validation_time_seconds: 300
  max_errors_per_file: 100
  max_warnings_per_file: 1000
  stale_threshold_days: 30

# CI enforcement rules
ci_enforcement:
  pre_commit:
    enabled: true
    strict_mode: false
    allowed_states: ["UNTRACKED", "VALIDATED", "LOCKED"]
  
  pre_push:
    enabled: true
    strict_mode: true
    required_states: ["VALIDATED", "LOCKED"]
  
  release:
    enabled: true
    strict_mode: true
    required_states: ["LOCKED"]
    merkle_verification: true 
