# Hooksmith File Types Configuration
# This file defines the file types and their generation rules

# Allowed types for manually maintained source files
allowed_types:
  - rs
  - jsonc

# Allowed extensions for manually maintained source files
allowed_extensions:
  - rs
  - jsonc

# Generated extensions that must have proper headers
generated_extensions:
  - toml
  - md
  - yml
  - yaml
  - gitignore
  - gitattributes
  - CODEOWNERS
  - json
  - jql
  - jsonl
  - wit
  - makefile
  - editorconfig
  - envrc

# Use .gitignore for ignoring files instead of manual list
use_gitignore: true

# Define comment syntax for each file type
generated_markers:
  md:
    prefix: "<!--"
    suffix: "-->"
  toml:
    prefix: "#"
    suffix: ""
  yml:
    prefix: "#"
    suffix: ""
  yaml:
    prefix: "#"
    suffix: ""
  gitignore:
    prefix: "#"
    suffix: ""
  gitattributes:
    prefix: "#"
    suffix: ""
  CODEOWNERS:
    prefix: "#"
    suffix: ""
  json:
    prefix: "//"
    suffix: ""
  jsonc:
    prefix: "//"
    suffix: ""
  jsonl:
    prefix: "//"
    suffix: ""
  jql:
    prefix: "//"
    suffix: ""
  wit:
    prefix: "//"
    suffix: ""
  makefile:
    prefix: "#"
    suffix: ""
  editorconfig:
    prefix: "#"
    suffix: ""
  envrc:
    prefix: "#"
    suffix: ""

# Generation commands for each file type
generation_commands:
  md: "xtask gen-docs"
  toml: "xtask gen-config"
  yml: "xtask gen-config"
  yaml: "xtask gen-config"
  gitignore: "xtask gen-gitattributes"
  gitattributes: "xtask gen-gitattributes"
  CODEOWNERS: "xtask gen-config"
  json: "xtask gen-schema"
  jsonc: "xtask gen-config"
  jsonl: "xtask gen-schema"
  jql: "xtask gen-jql"
  wit: "xtask gen-wit"
  makefile: "xtask gen-config"
  editorconfig: "xtask gen-config"
  envrc: "xtask gen-config" 
