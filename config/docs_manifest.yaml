# Documentation Generation Manifest for Hooksmith
# This file defines which documentation files should be generated and how

docs:
  # CLI Help Documentation
  - path: "docs/CLI_HELP.md"
    generator: "cli_help"
    partial_edit: false
    description: "Auto-generated CLI help documentation"

  # Repository Structure Documentation
  - path: "docs/STRUCTURE.md"
    generator: "structure"
    partial_edit: false
    description: "Auto-generated repository structure documentation"

  # Examples Documentation
  - path: "docs/EXAMPLES.md"
    generator: "examples"
    partial_edit: false
    description: "Auto-generated examples documentation"

  # Component Documentation
  - path: "components/cli-core/README.md"
    generator: "component_readme"
    partial_edit: false
    description: "Auto-generated CLI core component documentation"

  - path: "components/git-filter/README.md"
    generator: "component_readme"
    partial_edit: false
    description: "Auto-generated git-filter component documentation"

  - path: "components/hook-builder/README.md"
    generator: "component_readme"
    partial_edit: false
    description: "Auto-generated hook-builder component documentation"

  - path: "components/worktree-runner/README.md"
    generator: "component_readme"
    partial_edit: false
    description: "Auto-generated worktree-runner component documentation"

  # Main README (partially hand-edited)
  - path: "README.md"
    generator: "template"
    partial_edit: true
    template: "README"
    description: "Main project README with CLI help integration"

# Global configuration
global_config:
  # Output directory for generated documentation
  output_dir: "docs"
  
  # Whether to validate generated files
  validate: true
  
  # Whether to open documentation in browser after generation
  open_browser: false
  
  # Template directory
  template_dir: "templates"
  
  # Git attributes configuration
  git_attributes:
    # Mark generated files as codegen
    mark_generated: true
    
    # Files to mark as generated
    generated_patterns:
      - "docs/*.md"
      - "components/*/README.md"
      - "STRUCTURE.md" 