# WTP Configuration for Hooksmith Worktree Runner
# This file demonstrates how the WASM component can leverage existing tool configs

# Default worktree base directory
worktree_base: "../worktrees"

# Post-create hooks (automatically run after worktree creation)
hooks:
  post_create:
    - name: "Copy environment files"
      command: "cp"
      args: [".env", ".env.local"]
      cwd: "{{worktree_path}}"
      condition: "file_exists('.env')"
    
    - name: "Install dependencies"
      command: "cargo"
      args: ["build"]
      cwd: "{{worktree_path}}"
      condition: "file_exists('Cargo.toml')"
    
    - name: "Run tests"
      command: "cargo"
      args: ["test"]
      cwd: "{{worktree_path}}"
      condition: "file_exists('Cargo.toml')"
    
    - name: "Generate documentation"
      command: "./scripts/generate-docs.sh"
      cwd: "{{worktree_path}}"
      condition: "file_exists('scripts/generate-docs.sh')"
  
  pre_remove:
    - name: "Clean build artifacts"
      command: "cargo"
      args: ["clean"]
      cwd: "{{worktree_path}}"
      condition: "file_exists('Cargo.toml')"

# Worktree naming patterns
naming:
  pattern: "{{branch_name}}"
  sanitize: true
  max_length: 50

# Git configuration
git:
  fetch_on_create: true
  push_on_remove: false
  auto_merge: false

# Environment variables to copy
env_files:
  - ".env"
  - ".env.local"
  - ".env.example"

# Setup commands for different project types
setup_commands:
  rust:
    - "cargo build"
    - "cargo test"
  node:
    - "npm install"
    - "npm run build"
  python:
    - "pip install -r requirements.txt"
    - "python -m pytest"

# Integration with Hooksmith WASM component
hooksmith:
  wasm_component: "worktree-runner"
  config_source: "wit/worktree-runner.wit"
  auto_detect_tools: true
  fallback_to_git: true 