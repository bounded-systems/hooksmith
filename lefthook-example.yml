# Example Lefthook configuration with Hooksmith verify-hooks integration
# This file demonstrates how to automatically verify Hooksmith registration after push

pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all -- --check
    clippy:
      glob: "*.rs"
      run: cargo clippy --all-targets --all-features -- -D warnings
    test:
      run: cargo test --all-targets --all-features
    contract-check:
      run: cargo run -p xtask -- contract-check --staged-only --strict
      description: "Validate contract compliance and migration progress"

pre-push:
  parallel: true
  commands:
    audit:
      run: cargo audit
    check-generated:
      run: cargo xtask check --strict
    contract-check:
      run: cargo xtask contract check --strict
      description: "Run contract-driven validation to ensure project health"

# Post-push hook to verify Hooksmith registration
post-push:
  commands:
    verify-hooksmith:
      run: hooksmith verify-hooks
      description: "Verify Hooksmith is properly registered in all Git hooks"

# Post-commit hook for empty commit message reminders
post-commit:
  commands:
    empty-commit-reminder:
      run: |
        if [ -z "$(git log -1 --pretty=%B)" ]; then
          echo "✅ Empty commit message accepted (Trunk-style)."
          echo "💡 Use 'git commit --amend' if you want to add details later."
        fi
      description: "Remind about empty commit messages (Trunk-style)"

commit-msg:
  commands:
    conventional:
      run: cargo run -p xtask -- validate-commit-msg --file "$1"
      description: "Validate commit message (Trunk-style: allows empty messages)" 
