# Hooksmith File Types Configuration
# This file defines the file types and their generation rules

# Allowed types for manually maintained source files
allowed_types:
  - rs
  - jsonc

# Allowed extensions for manually maintained source files
allowed_extensions:
  - rs
  - jsonc

# Generated types that must have proper headers
generated_types:
  - toml
  - md
  - yml
  - gitignore
  - gitattributes
  - CODEOWNERS
  - json
  - jql
  - jsonl
  - wit
  - makefile
  - editorconfig
  - envrc

# Excluded paths (patterns to ignore)
excluded_paths:
  - target/
  - .git/
  - node_modules/
  - dist/
  - build/

# Manual files (files that are manually maintained)
manual_files:
  - Cargo.toml
  - Cargo.lock
  - rust-toolchain.toml
  - .gitignore
  - .gitattributes

# Define comment syntax for each file type
markers:
  md: "<!--"
  toml: "#"
  yml: "#"
  gitignore: "#"
  gitattributes: "#"
  CODEOWNERS: "#"
  json: "//"
  jsonc: "//"
  jsonl: "//"
  jql: "//"
  wit: "//"
  makefile: "#"
  editorconfig: "#"
  envrc: "#"

# Generation commands for each file type
generation_commands:
  md: "xtask gen-docs"
  toml: "xtask gen-config"
  yml: "xtask gen-config"
  yaml: "xtask gen-config"
  gitignore: "xtask gen-gitattributes"
  gitattributes: "xtask gen-gitattributes"
  CODEOWNERS: "xtask gen-config"
  json: "xtask gen-schema"
  jsonc: "xtask gen-config"
  jsonl: "xtask gen-schema"
  jql: "xtask gen-jql"
  wit: "xtask gen-wit"
  makefile: "xtask gen-config"
  editorconfig: "xtask gen-config"
  envrc: "xtask gen-config" 
